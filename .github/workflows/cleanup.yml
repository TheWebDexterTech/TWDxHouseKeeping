name: 🧹 TWDxHouseKeeping

on:
  schedule:
    - cron: "0 0 * * *"   # Every night at midnight UTC (production)
  workflow_dispatch:        # Manual trigger from Actions tab
    inputs:
      dry_run:
        description: "Dry run? (true = preview only, false = actually delete)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

# HK-05: Concurrency guard — prevent two runs overlapping
concurrency:
  group: housekeeping
  cancel-in-progress: false

jobs:
  cleanup:
    name: Run Housekeeping
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    env:
      # HK-01: DRY_RUN defaults to true for safety on scheduled runs.
      # On manual dispatch, uses the value chosen in the UI.
      # To run for real on a schedule, change the line below to: DRY_RUN: "false"
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'true' }}
      ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
      # Optional — add DISCORD_WEBHOOK_URL as a Repository Secret to enable notifications.
      # If the secret is not set, the notification step is silently skipped.
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Show run mode
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 Running in DRY-RUN mode — nothing will be deleted."
          else
            echo "🗑️  Running in LIVE mode — deletions are REAL."
          fi

      - name: Run cleanup
        run: node src/cleanup.js
