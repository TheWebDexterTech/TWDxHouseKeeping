name: TWDxHouseKeeping Tools

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every night at Midnight UTC
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab

jobs:
  run-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      - name: Execute Cleanup Script
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
        run: node src/cleanup.js
